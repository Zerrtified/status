name: Dry Run
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  web-deploy:
    name: Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v7

      - name: Sync files (Dry Run)
        id: sync
        # Run inside a pseudo-terminal wrapper using 'script' to record stdout/stderr to dryrun.log
        run: |
          script -q -e -c "cat << 'EOF' > run_deploy.sh
          # We use the docker container directly via action
          EOF
          " /dev/null

      # To record Docker / Action output directly, we run the step and pipe its output to a log file
      - name: Run FTP Action
        id: ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          dry-run: true
          local-dir: ./src/
          # log-level: verbose

      - name: Capture Step Log
        id: log_capture
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the raw step log for this job run directly from GitHub's API
          RUN_ID="${{ github.run_id }}"
          JOB_NAME="${{ github.job }}"

          # Query job logs from GitHub API
          gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs > jobs.json
          JOB_ID=$(jq -r ".jobs[] | select(.name==\"Dry Run\") | .id" jobs.json)

          # Download step logs
          gh api repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs > full_run.log || true

          # Clean ANSI color codes and extract relevant lines
          sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2})?)?[mGK]//g" full_run.log > clean_run.log

          # Filter to only lines from the FTP step
          grep -i -E "ftp|sync|file|upload|delete|dry-run|src" clean_run.log | tail -n 100 > ftp_summary.txt || echo "No explicit changes found." > ftp_summary.txt

          # Save to output variable for comment
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          cat ftp_summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with Dry Run Output
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        env:
          DRY_RUN_LOGS: ${{ steps.log_capture.outputs.logs }}
          SYNC_OUTCOME: ${{ steps.ftp.outputs }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const logs = process.env.DRY_RUN_LOGS || 'No changed files recorded in dry run.';
            const outcome = process.env.SYNC_OUTCOME;

            const details = `#### FTP Sync Dry Run Status: \`${outcome === 'success' ? 'SUCCESS 🚀' : 'FAILED ❌'}\`

            <details><summary>Show Dry Run Logs</summary>

            \`\`\`text
            ${logs}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('FTP Sync Dry Run Status');
            });

            const body = details.length > 60000
              ? details.substring(0, 60000) + '\n\n...[Output truncated due to size limit]'
              : details;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
