name: Dry Run
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  web-deploy:
    name: Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v7

      - name: Run FTP Dry Run & Capture Logs
        id: sync
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # 1. Create a minimal inline config for the npm package
          cat << 'EOF' > ftp-config.json
          {
            "server": "$FTP_SERVER",
            "username": "$FTP_USERNAME",
            "password": "$FTP_PASSWORD",
            "protocol": "ftps",
            "dryRun": true,
            "localDir": "./src/"
          }
          EOF

          # Substitute secrets into the temporary config file
          sed -i "s/\$FTP_SERVER/$FTP_SERVER/g" ftp-config.json
          sed -i "s/\$FTP_USERNAME/$FTP_USERNAME/g" ftp-config.json
          sed -i "s/\$FTP_PASSWORD/$FTP_PASSWORD/g" ftp-config.json

          # 2. Run the deployment engine directly and capture full terminal stdout
          RAW_LOGS=$(npx --yes @samkirkland/ftp-deploy ftp-config.json 2>&1) || true

          # Clean up temporary credentials file immediately
          rm -f ftp-config.json

          # 3. Save output to GITHUB_OUTPUT for the comment step
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          echo "$RAW_LOGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with Dry Run Output
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        env:
          DRY_RUN_LOGS: ${{ steps.sync.outputs.logs }}
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const logs = process.env.DRY_RUN_LOGS || 'No logs recorded.';
            const outcome = process.env.SYNC_OUTCOME;

            const details = `#### FTP Sync Dry Run Status: \`${outcome === 'success' ? 'SUCCESS 🚀' : 'FAILED ❌'}\`

            <details><summary>Show Dry Run Logs</summary>

            \`\`\`text
            ${logs}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('FTP Sync Dry Run Status');
            });

            const body = details.length > 60000
              ? details.substring(0, 60000) + '\n\n...[Output truncated due to size limit]'
              : details;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
