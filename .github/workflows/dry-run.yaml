name: Dry Run
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  web-deploy:
    name: Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v7

      - name: Run FTP Dry Run
        id: ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          dry-run: true
          local-dir: ./src/

      - name: Capture Step Log
        id: log_capture
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch step logs directly from GitHub API
          RUN_ID="${{ github.run_id }}"
          JOB_ID=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs --jq '.jobs[] | select(.name=="Dry Run") | .id')

          # Stream job logs
          gh api repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs > full_run.log || true

          # Filter out API log headers & timestamps, keep only actual console prints
          sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}\.[0-9]+Z //' full_run.log > clean.log

          # Isolate lines from the FTP step (from "Thanks for using ftp-deploy" to "Total time:")
          sed -n '/Thanks for using ftp-deploy/,/Total time:/p' clean.log > ftp_output.txt || true

          # Fallback if range match isn't triggered
          if [ ! -s ftp_output.txt ]; then
            grep -i -E "uploading|Upload:|Delete:|Replacing:|Files:" clean.log > ftp_output.txt || echo "No changes detected." > ftp_output.txt
          fi

          # Save output into GITHUB_OUTPUT
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          cat ftp_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with Dry Run Output
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        env:
          DRY_RUN_LOGS: ${{ steps.log_capture.outputs.logs }}
          SYNC_OUTCOME: ${{ steps.ftp.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rawLogs = process.env.DRY_RUN_LOGS || 'No changes detected.';
            const outcome = process.env.SYNC_OUTCOME;

            const details = `#### FTP Sync Dry Run Status: \`${outcome === 'success' ? 'SUCCESS 🚀' : 'FAILED ❌'}\`

            <details open><summary>Show Dry Run Output</summary>

            \`\`\`text
            ${rawLogs}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('FTP Sync Dry Run Status');
            });

            const body = details.length > 60000
              ? details.substring(0, 60000) + '\n\n...[Output truncated due to size limit]'
              : details;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
