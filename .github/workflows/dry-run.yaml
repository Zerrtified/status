name: Dry Run
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  web-deploy:
    name: Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v7

      - name: Sync files (Dry Run)
        id: sync
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          dry-run: true
          local-dir: ./src/
          log-level: verbose

      - name: Comment PR with Dry Run Output
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        env:
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const outcome = process.env.SYNC_OUTCOME;

            // Attempt to read the sync state or local log if generated by the package
            let logText = 'Dry run complete. Check GitHub Action step logs for full stream details.';

            if (fs.existsSync('.ftp-deploy-sync-state.json')) {
              try {
                const stateData = fs.readFileSync('.ftp-deploy-sync-state.json', 'utf8');
                logText = 'Sync State File Content:\n' + stateData;
              } catch (e) {
                // fallback if unreadable
              }
            }

            const details = `#### FTP Sync Dry Run Status: \`${outcome === 'success' ? 'SUCCESS 🚀' : 'FAILED ❌'}\`

            <details><summary>Show Sync Details</summary>

            \`\`\`json
            ${logText}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('FTP Sync Dry Run Status');
            });

            const body = details.length > 60000
              ? details.substring(0, 60000) + '\n\n...[Output truncated due to size limit]'
              : details;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
