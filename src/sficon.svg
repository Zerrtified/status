<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Netflix Red Gradient for Front Ribbons -->
    <linearGradient id="netflixRedFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#B81D24" />
    </linearGradient>

    <!-- Darker Red Gradient for Back/Shadow Ribbons -->
    <linearGradient id="netflixRedBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B81D24" />
      <stop offset="100%" stop-color="#7B0005" />
    </linearGradient>

    <!-- Glow & Shadow Filter -->
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="foldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="512" height="512" rx="96" fill="#141414" />

  <!-- Ambient Back Glow -->
  <g opacity="0.35" filter="url(#redGlow)">
    <!-- Base S Silhouette for glow -->
    <path d="M 256 64 L 352 144 L 352 208 L 256 160 Z M 160 144 L 256 64 L 256 128 L 160 208 Z" fill="#E50914" />
  </g>

  <!-- Cool S Ribbon Paths -->
  <g filter="url(#foldShadow)">
    <!-- Top Roof Point -->
    <polygon points="256,64 352,144 312,144 256,98 200,144 160,144" fill="url(#netflixRedFront)" />

    <!-- Top Left Vertical Bar -->
    <rect x="160" y="156" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Top Middle Vertical Bar -->
    <rect x="236" y="156" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Top Right Vertical Bar -->
    <rect x="312" y="156" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Middle Diagonals (The Ribbon Folds) -->
    <!-- Diagonal 1: Top-Left to Mid-Center -->
    <polygon points="160,236 200,236 276,292 236,292" fill="url(#netflixRedBack)" />

    <!-- Diagonal 2: Top-Mid to Mid-Right -->
    <polygon points="236,236 276,236 352,292 312,292" fill="url(#netflixRedFront)" />

    <!-- Bottom Left Vertical Bar -->
    <rect x="160" y="276" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Bottom Middle Vertical Bar -->
    <rect x="236" y="276" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Bottom Right Vertical Bar -->
    <rect x="312" y="276" width="40" height="80" rx="2" fill="url(#netflixRedFront)" />

    <!-- Bottom Point -->
    <polygon points="160,368 200,368 256,414 312,368 352,368 256,448" fill="url(#netflixRedFront)" />
  </g>
</svg>
